# nginx reverse proxy for the Trading-AI API.
# Put this at /etc/nginx/sites-available/trading-ai then symlink to sites-enabled.
# Replace api.example.com with your domain. SSL lines are added automatically
# by `certbot --nginx` (Let's Encrypt) — see docs/DEPLOY.md.

# Rate-limit zone: 20 requests/sec/IP, burst 40 (the engines are not free to call).
limit_req_zone $binary_remote_addr zone=apilimit:10m rate=20r/s;

server {
    listen 80;
    server_name api.example.com;

    # Let certbot manage the 80→443 redirect; until then, proxy on 80 too.
    location / {
        limit_req zone=apilimit burst=40 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # The engines hit live NSE; give them time before timing out.
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # Block everything except the public API surface (defence in depth).
    location ~ ^/(docs|redoc|openapi.json)$ {
        return 404;
    }
}
