<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Trading-AI</title>
<style>
  :root{ --bg:#0b0f17; --card:#141a26; --line:#222b3a; --txt:#e6edf3;
         --mut:#8b97a8; --acc:#3b82f6; --good:#22c55e; --bad:#ef4444; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--txt);
    font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:28px 18px 60px}
  h1{font-size:20px;margin:0 0 2px} .sub{color:var(--mut);font-size:13px;margin-bottom:20px}
  .box{display:flex;gap:8px} input{flex:1;background:var(--card);border:1px solid var(--line);
    color:var(--txt);border-radius:10px;padding:13px 14px;font-size:15px;outline:none}
  input:focus{border-color:var(--acc)} button{background:var(--acc);color:#fff;border:0;
    border-radius:10px;padding:0 18px;font-size:15px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:wait}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 4px}
  .chip{background:var(--card);border:1px solid var(--line);color:var(--mut);
    border-radius:999px;padding:6px 12px;font-size:12.5px;cursor:pointer}
  .chip:hover{color:var(--txt);border-color:var(--acc)}
  .answer{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:16px 18px;margin-top:18px;white-space:pre-wrap}
  .meta{color:var(--mut);font-size:12px;margin-top:8px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;margin-top:14px}
  .c{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .c .k{color:var(--mut);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
  .c .v{font-size:16px;font-weight:600;margin-top:3px}
  .warn{color:#f59e0b} .err{color:var(--bad)} .ok{color:var(--good)}
  details{margin-top:14px} summary{color:var(--mut);cursor:pointer;font-size:13px}
  pre{background:#0d1320;border:1px solid var(--line);border-radius:10px;padding:12px;
    overflow:auto;font-size:12px;color:#b9c2d0}
  .foot{color:var(--mut);font-size:11.5px;margin-top:26px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>📈 Trading-AI</h1>
  <div class="sub">NSE equities + NIFTY/BANKNIFTY options intelligence · paper-trading only · not financial advice</div>

  <div class="box">
    <input id="q" placeholder="e.g. best banknifty intraday option today"
           value="best banknifty intraday option today"/>
    <button id="go">Ask</button>
  </div>
  <div class="chips" id="chips"></div>

  <div id="out"></div>

  <div class="foot">Quantitative engines produce every number · the AI only summarizes · paper mode</div>
</div>

<script>
  // ── point this at your API ──
  const API = "https://ketan-trading.duckdns.org";

  const examples = [
    "best banknifty intraday option today",
    "nifty options view",
    "best stocks to buy for swing",
    "build me a portfolio book"
  ];
  const chips = document.getElementById('chips');
  examples.forEach(e=>{const s=document.createElement('span');s.className='chip';
    s.textContent=e;s.onclick=()=>{q.value=e;ask();};chips.appendChild(s);});

  const q=document.getElementById('q'), go=document.getElementById('go'), out=document.getElementById('out');
  go.onclick=ask; q.addEventListener('keydown',e=>{if(e.key==='Enter')ask();});

  function card(k,v){return `<div class="c"><div class="k">${k}</div><div class="v">${v}</div></div>`;}

  async function ask(){
    const query=q.value.trim(); if(!query)return;
    go.disabled=true; out.innerHTML='<div class="answer">Thinking… (first call can take a few seconds)</div>';
    try{
      const r=await fetch(API+"/query",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({q:query, polish:false})});
      if(!r.ok) throw new Error("HTTP "+r.status);
      const d=await r.json();
      render(d);
    }catch(err){
      out.innerHTML=`<div class="answer err">Couldn't reach the API: ${err.message}.<br>
        If this is a CORS or network error, check the API is up and ALLOWED_ORIGINS includes this site.</div>`;
    }finally{ go.disabled=false; }
  }

  function render(d){
    let html=`<div class="answer">${(d.answer||'(no answer)')}</div>`;
    html+=`<div class="meta">intent: ${d.intent||'-'}${d.symbol?(' · '+d.symbol):''}</div>`;

    // pull a few headline numbers out of the structured data, if present
    const data=d.data||{}; const cards=[];
    const s=data.structure||(data.recommended_structure);
    if(data.prob_up!=null) cards.push(card('P(up)', data.prob_up));
    if(data.action) cards.push(card('Action', data.action));
    if(s&&s.kind) cards.push(card('Structure', s.kind.replaceAll('_',' ')));
    if(s&&s.breakevens) cards.push(card('Breakevens', JSON.stringify(s.breakevens)));
    if(s&&s.max_loss_rupees!=null) cards.push(card('Max loss', '₹'+s.max_loss_rupees));
    const ir=data.intraday_regime; if(ir&&ir.regime) cards.push(card('Intraday regime', ir.regime));
    if(Array.isArray(d.data?.actionable)) cards.push(card('Actionable', d.data.actionable.length));
    if(cards.length) html+=`<div class="cards">${cards.join('')}</div>`;

    html+=`<details><summary>Show full data (JSON)</summary><pre>${
      JSON.stringify(d.data,null,2)}</pre></details>`;
    out.innerHTML=html;
  }
</script>
</body>
</html>
